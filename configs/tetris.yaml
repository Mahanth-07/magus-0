# Reconciled to the REAL 29_tetris game (games/benchmark/29_tetris): control keys verified
# by observing the active piece move (ArrowLeft/Right shift x; x rotates; Space hard-drops and
# scores), and metric keys verified against window.gameAPI.getState() (game_state.score etc).
name: tetris
objective: >-
  Tetris. The game state lists "Candidate placements": EVERY legal rotation x column
  hard-drop, already simulated for you in code, each showing the resulting holes /
  max height / lines cleared and the EXACT "actions" macro that reaches it. The list is
  ALREADY SORTED best-first by an expert Tetris evaluation (line clears, holes, height,
  surface smoothness).
  Candidate [0] is the BEST move. DO NOT invent your own moves and DO NOT guess where the
  piece will land — it is already computed. Simply COPY candidate [0]'s "actions" array
  VERBATIM into your response's "actions" field, character-for-character, INCLUDING every
  "rotate". For example, if the state shows
  [0] rotate x2, col 4 -> ... actions=['rotate','rotate','right','drop']
  then you MUST return "actions": ["rotate","rotate","right","drop"] and set "action" to
  the LAST element ("drop"). Never drop a candidate's leading "rotate" moves. Never return
  a bare ["drop"] unless candidate [0]'s actions are exactly ["drop"].
legal_actions: [left, right, rotate, drop]
primary_metric: score
higher_is_better: true
timing_ms: 120
control_map: {left: ArrowLeft, right: ArrowRight, rotate: x, drop: Space}
relevant_metrics: [score, level, lines_remaining, occupied_cells]
